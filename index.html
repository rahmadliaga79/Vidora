<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Vidora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>VIDORA</h2>

    <label>Upload Gambar</label>
    <input type="file" id="images" multiple>

    <label>Teks per Scene</label>
    <textarea id="texts" placeholder="1 baris = 1 scene"></textarea>

    <label>Filter</label>
    <select id="filter">
      <option value="none">Normal</option>
      <option value="brightness(0.8) contrast(1.3)">Cinematic</option>
      <option value="grayscale(1)">B&W</option>
      <option value="sepia(1)">Vintage</option>
    </select>

    <label>Musik</label>
    <input type="file" id="music">

    <button onclick="startRender()">🎬 Render</button>

    <div id="progress">Idle...</div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <canvas id="canvas" width="500" height="500"></canvas>
  </div>

</div>

<footer>
  © 2026 Vidora — by Rahmad Liaga
</footer>

<script src="script.js"></script>
</body>
</html>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>VIDORA</h2>

    <label>Upload Gambar</label>
    <input type="file" id="images" multiple accept="image/*">

    <label>Teks per Scene</label>
    <textarea id="texts" placeholder="Pisahkan dengan ENTER"></textarea>

    <label>Musik</label>
    <input type="file" id="music" accept="audio/*">

    <button onclick="startRender()">Render</button>
  </div>

  <!-- PREVIEW -->
  <div class="preview">
    <canvas id="canvas" width="400" height="400"></canvas>
  </div>

</div>

  © 2026 Vidora — by Rahmad Liaga
</footer>

<script src="script.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
